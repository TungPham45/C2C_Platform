services:
  postgres:
    image: postgres:15-alpine
    container_name: c2c-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_MULTIPLE_DATABASES: admin_mod_db, auth_db, chat_db, order_db, product_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-db.sh:/docker-entrypoint-initdb.d/init-multiple-db.sh
      - ./libs/prisma-clients:/docker-entrypoint-initdb.d/prisma-clients:ro
      - ./db/seeds:/docker-entrypoint-initdb.d/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  auth-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        APP_NAME: auth-service
    container_name: c2c-platform-auth
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/auth_db
      INTERNAL_SERVICE_TOKEN: internal-dev-token
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        APP_NAME: product-service
    container_name: c2c-platform-product
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/product_db
      INTERNAL_SERVICE_TOKEN: internal-dev-token
      PUBLIC_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - product_uploads:/app/public/uploads/products

  admin-moderation-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        APP_NAME: admin-moderation-service
    container_name: c2c-platform-admin
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/admin_mod_db
      INTERNAL_SERVICE_TOKEN: internal-dev-token
      AUTH_SERVICE_BASE_URL: http://auth-service:3002/api/auth
      PRODUCT_SERVICE_BASE_URL: http://product-service:3001/api/products
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      product-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        APP_NAME: api-gateway
    container_name: c2c-platform-gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3002/api/auth
      PRODUCT_SERVICE_URL: http://product-service:3001/api/products
      ADMIN_SERVICE_URL: http://admin-moderation-service:3005/api/admin
      PRODUCT_PUBLIC_URL: http://product-service:3001/uploads
    depends_on:
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
      admin-moderation-service:
        condition: service_started
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: c2c-platform-web
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "4200:4200"

volumes:
  postgres_data:
  product_uploads:
